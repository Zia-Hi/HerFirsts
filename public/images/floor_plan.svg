    <rect x="38" y="80" width="22" height="8" fill="#d9ccb8"/>
    
    <rect x="68" y="3" width="30" height="22" fill="url(#tile)" fill-opacity="0.9"/>
    <text x="83" y="14" fill="#748472" font-size="1.5" text-anchor="middle" font-family="serif">Shower</text>
    <rect x="70" y="5" width="26" height="18" fill="#cdd6cb" rx="1"/>
    <circle cx="86" cy="10" r="1.5" fill="#8f8f8f"/>
    
    <rect x="68" y="30" width="30" height="23" fill="url(#tile)" fill-opacity="0.9"/>
    <text x="83" y="42" fill="#748472" font-size="1.5" text-anchor="middle" font-family="serif">Bathroom</text>
    <circle cx="74" cy="38" r="2.5" fill="#d8d8d8"/>
    <rect x="82" y="35" width="6" height="8" fill="#8f6b4a"/>
    
    <rect x="68" y="55" width="30" height="40" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="83" y="75" fill="#6b5a4a" font-size="1.5" text-anchor="middle" font-family="serif">Laundry</text>
    <rect x="70" y="60" width="12" height="8" fill="#a0a0a0"/>
