<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="wood" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#d4c8b0" stroke-width="0.1" opacity="0.4"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#d4c8b0" stroke-width="0.05" opacity="0.2"/>
    </pattern>
    <pattern id="tile" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="3" height="3" fill="none" stroke="#c0c9c0" stroke-width="0.1" opacity="0.3"/>
    </pattern>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a4a38"/>
      <stop offset="100%" stop-color="#3d3229"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#dropShadow)">
    <path d="M2 2 L98 2 L98 98 L2 98 Z" fill="#e8dfd0" stroke="url(#wallGrad)" stroke-width="1.5"/>
    
    <path d="M32 2 L32 30 M32 34 L32 52" stroke="url(#wallGrad)" stroke-width="1" fill="none"/>
    <path d="M66 2 L66 26 M66 30 L66 54" stroke="url(#wallGrad)" stroke-width="1" fill="none"/>
    <path d="M2 30 L32 30 M2 52 L32 52" stroke="url(#wallGrad)" stroke-width="1" fill="none"/>
    <path d="M32 26 L66 26 M32 50 L66 50" stroke="url(#wallGrad)" stroke-width="1" fill="none"/>
    <path d="M66 54 L98 54" stroke="url(#wallGrad)" stroke-width="1" fill="none"/>
    
    <rect x="3" y="3" width="28" height="25" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="17" y="15" fill="#6b5a4a" font-size="1.8" text-anchor="middle" font-family="serif">Bedroom</text>
    <rect x="5" y="8" width="12" height="14" fill="#a89070" rx="0.5"/>
    <circle cx="11" cy="15" r="2" fill="#fff8e7"/>
    
    <rect x="3" y="35" width="28" height="16" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="17" y="43" fill="#6b5a4a" font-size="1.5" text-anchor="middle" font-family="serif">Study</text>
    <rect x="5" y="37" width="8" height="6" fill="#6b5a4a"/>
    
    <rect x="34" y="3" width="31" height="22" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="49.5" y="14" fill="#6b8b6b" font-size="1.5" text-anchor="middle" font-family="serif">Kitchen</text>
    <rect x="36" y="7" width="14" height="10" fill="#6b8b6b"/>
    <rect x="52" y="7" width="11" height="12" fill="#6b8b6b" rx="0.5"/>
    
    <rect x="34" y="30" width="31" height="19" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="49.5" y="39" fill="#b8954f" font-size="1.5" text-anchor="middle" font-family="serif">Dining</text>
    <rect x="39" y="33" width="20" height="12" fill="#8f6b4a"/>
    <circle cx="49.5" cy="39" r="3" fill="#d4a574"/>
    
    <rect x="34" y="53" width="31" height="20" fill="url(#wood)" fill-opacity="0.8"/>
    <text x="49.5" y="63" fill="#d9c28e" font-size="1.5" text-anchor="middle" font-family="serif">Living Room</text>
    <rect x="38" y="57" width="18" height="10" fill="#c8b896" rx="1"/>
    <circle cx="47" cy="70" r="3" fill="#8f6b4a"/>
    
